<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CCSE IT Capstone — Media intake and organization system. Team showcase and project overview."
    />
    <title>Media Intake &amp; Organization — Capstone Team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      根目录 index.html 仅供 Vite 开发（npm run dev）使用，不能直接双击打开。
      离线整站：在项目根目录运行 npm run build:local，然后双击生成的 offline.html 或 dist/index.html。
      开发服务器：npm run dev → 浏览器打开终端中的 http://localhost:5173
    -->
    <div
      id="boot-hint"
      style="
        font-family: system-ui, sans-serif;
        max-width: 36rem;
        margin: 2rem auto;
        padding: 1.25rem 1.5rem;
        line-height: 1.6;
        color: #1e293b;
        background: #f1f5f9;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
      "
    >
      <p style="margin: 0 0 0.75rem; font-weight: 600">页面空白？</p>
      <p style="margin: 0 0 0.75rem">
        本站点是 <strong>Vite + React</strong> 项目：根目录的 <code>index.html</code> 只用于开发打包入口，
        <strong>不能直接双击</strong>打开完整网站。
      </p>
      <p style="margin: 0 0 0.5rem"><strong>离线双击打开（无需 localhost）：</strong></p>
      <pre
        style="margin: 0 0 1rem; padding: 0.75rem 1rem; background: #0f172a; color: #e2e8f0; border-radius: 8px; overflow: auto; font-size: 0.875rem"
      ><code>npm install
npm run build:local</code></pre>
      <p style="margin: 0 0 0.75rem">
        然后在资源管理器中双击项目根目录下的 <code>offline.html</code>（或 <code>dist/index.html</code>）。
      </p>
      <p style="margin: 0 0 0.5rem"><strong>日常开发：</strong></p>
      <pre
        style="margin: 0 0 1rem; padding: 0.75rem 1rem; background: #0f172a; color: #e2e8f0; border-radius: 8px; overflow: auto; font-size: 0.875rem"
      ><code>npm run dev</code></pre>
      <p style="margin: 0; font-size: 0.9rem; color: #64748b">
        GitHub Pages 部署仍使用 <code>npm run build</code>（CI 自动执行）；<code>build:local</code> 专用于生成可 file:// 打开的单文件包。
      </p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
