<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CCSE IT Capstone — Media intake and organization system. Team showcase and project overview."
    />
    <title>Media Intake &amp; Organization — Capstone Team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      不要直接用 file:// 打开本文件：浏览器无法编译 TypeScript/JSX。
      开发：在项目根目录运行 npm run dev，用终端里给出的 http://localhost:5173 访问。
      静态预览：运行 npm run build 后，用浏览器打开 dist/index.html（已配置相对路径资源）。
    -->
    <div
      id="boot-hint"
      style="
        font-family: system-ui, sans-serif;
        max-width: 36rem;
        margin: 2rem auto;
        padding: 1.25rem 1.5rem;
        line-height: 1.6;
        color: #1e293b;
        background: #f1f5f9;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
      "
    >
      <p style="margin: 0 0 0.75rem; font-weight: 600">页面空白？</p>
      <p style="margin: 0 0 0.75rem">
        本站点是 <strong>Vite + React</strong> 项目，<strong>不能</strong>像普通静态页一样双击根目录的
        <code>index.html</code> 打开。
      </p>
      <p style="margin: 0 0 0.5rem">请在本文件夹终端执行：</p>
      <pre
        style="margin: 0 0 1rem; padding: 0.75rem 1rem; background: #0f172a; color: #e2e8f0; border-radius: 8px; overflow: auto; font-size: 0.875rem"
      ><code>npm install
npm run dev</code></pre>
      <p style="margin: 0 0 0.75rem">然后在浏览器打开终端显示的地址（一般为 <code>http://localhost:5173</code>）。</p>
      <p style="margin: 0; font-size: 0.9rem; color: #64748b">
        若需离线双击预览：先执行 <code>npm run build</code>，再打开 <code>dist/index.html</code>。
      </p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
